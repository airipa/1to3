<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>BMI Global Master Pro </title>
    <style>
        :root {
            --main: #007aff;
            --trans: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        [data-theme="white"] {
            --bg: #f2f2f7;
            --card: #ffffff;
            --text: #000;
            --shd: 0 4px 15px rgba(0, 0, 0, 0.05);
            --border: rgba(0, 0, 0, 0.1);
        }
        [data-theme="dark"] {
            --bg: #000;
            --card: #1c1c1e;
            --text: #fff;
            --shd: 0 4px 20px rgba(255, 255, 255, 0.1);
            --border: rgba(255, 255, 255, 0.1);
        }
        [data-theme="neon"] {
            --bg: #000;
            --card: #0a0a0a;
            --text: #39ff14;
            --shd: 0 0 15px rgba(57, 255, 20, 0.3);
            --main: #39ff14;
            --border: #39ff14;
        }
        [data-theme="medical"] {
            --bg: #eef2f3;
            --card: #ffffff;
            --text: #2c3e50;
            --shd: 0 10px 30px rgba(52, 152, 219, 0.15);
            --main: #3498db;
            --border: #3498db;
        }
        [data-theme="soft"] {
            --bg: #fff5f5;
            --card: #ffffff;
            --text: #d63384;
            --shd: 0 4px 15px rgba(214, 51, 132, 0.1);
            --main: #fd7e14;
            --border: #ffc9c9;
        }
        [data-theme="luxury"] {
            --bg: #1a1a1a;
            --card: #2d2d2d;
            --text: #d4af37;
            --shd: 0 10px 25px rgba(0, 0, 0, 0.5);
            --main: #d4af37;
            --border: #d4af37;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: -apple-system, "SF Pro Text", "Helvetica Neue", sans-serif;
        }
        body {
            background: var(--bg);
            color: var(--text);
            transition: var(--trans);
            padding: 15px;
            min-height: 100vh;
        }

        .top-link {
            text-align: center;
            margin-bottom: 10px;
        }
        .top-link a {
            color: var(--main);
            text-decoration: none;
            font-weight: 600;
            font-size: 14px;
            opacity: 0.8;
        }

        .nav {
            display: flex;
            flex-direction: column;
            gap: 8px;
            margin-bottom: 12px;
        }
        .style-row {
            display: flex;
            align-items: center;
            gap: 8px;
            background: rgba(128, 128, 128, 0.1);
            padding: 8px 12px;
            border-radius: 12px;
            overflow-x: auto;
            -webkit-overflow-scrolling: touch;
        }
        .style-label {
            font-size: 11px;
            font-weight: 900;
            white-space: nowrap;
            width: 70px;
            opacity: 0.8;
        }
        .btn-grp {
            display: flex;
            gap: 6px;
        }
        .btn {
            border: 1px solid var(--border);
            background: rgba(128, 128, 128, 0.05);
            padding: 6px 12px;
            border-radius: 8px;
            font-size: 11px;
            cursor: pointer;
            color: var(--text);
            font-weight: 700;
            white-space: nowrap;
            transition: 0.2s;
        }
        .btn.active {
            background: var(--main);
            color: #fff;
            border-color: var(--main);
        }

        .main-card {
            background: var(--card);
            border-radius: 24px;
            padding: 25px;
            box-shadow: var(--shd);
            margin-bottom: 20px;
            border: 1px solid var(--border);
        }
        .input-row {
            display: flex;
            gap: 15px;
            margin-bottom: 30px;
        }
        .input-box {
            flex: 1;
            position: relative;
        }
        .input-box span {
            position: absolute;
            right: 15px;
            top: 50%;
            transform: translateY(-50%);
            font-size: 10px;
            opacity: 0.6;
            font-weight: 900;
        }
        .input-row input {
            width: 100%;
            padding: 16px;
            border-radius: 15px;
            border: 1px solid var(--border);
            background: rgba(128, 128, 128, 0.05);
            color: var(--text);
            font-size: 24px;
            font-weight: 900;
            outline: none;
        }

        .content-layout {
            display: grid;
            grid-template-columns: 1.2fr 0.8fr;
            gap: 15px;
        }
        .viz-box {
            height: 180px;
            width: 100%;
            display: flex;
            justify-content: center;
        }
        .body-svg {
            height: 100%;
            transition: 0.5s;
        }
        .res-display {
            text-align: center;
        }
        .res-num {
            font-size: 52px;
            font-weight: 900;
            color: var(--main);
            line-height: 1;
        }
        .res-lab {
            font-size: 14px;
            font-weight: 800;
            margin-top: 15px;
            padding: 6px 15px;
            border-radius: 10px;
            background: var(--main);
            color: #fff;
            display: inline-block;
        }

        .scale-area {
            position: relative;
            width: 45px;
            height: 420px;
            margin: 30px auto 0 auto;
            overflow: visible;
        }
        .scale-bar {
            position: relative;
            width: 100%;
            height: 100%;
            border-radius: 22px;
            background: linear-gradient(to top, #00f2fe 0%, #00ff88 20%, #fadb14 40%, #ff7a45 60%, #ff4d4f 100%);
            overflow: visible;
        }

        .tick-line {
            position: absolute;
            left: 0;
            width: 100%;
            height: 1.5px;
            background: rgba(255, 255, 255, 0.6);
            z-index: 5;
            pointer-events: none;
        }

        .std-label {
            position: absolute;
            top: -25px;
            white-space: nowrap;
            font-size: 11px;
            font-weight: 900;
            line-height: 1.2;
        }
        .std-label.L {
            right: calc(100% + 6px);
            text-align: right;
            color: var(--text);
        }
        .std-label.R {
            left: calc(100% + 6px);
            text-align: left;
            color: #ff4d4f;
        }

        /* 区间标签更贴近彩柱 */
        .tick-text {
            position: absolute;
            white-space: nowrap;
            font-size: 9px;
            font-weight: 800;
            line-height: 1.1;
            
        }
        .tick-text.L {
            right: calc(100% + 6px);
            text-align: right;
            color: var(--text);
            align-items: flex-end;
        }
        .tick-text.R {
            left: calc(100% + 6px);
            text-align: left;
            color: #ff4d4f;
            align-items: flex-start;
        }
        .tick-text span {
            font-size: 10px;
            opacity: 0.6;
            margin: 0 2px;
        }

        /* 刻度数值标签紧贴左侧 */
        .tick-num {
            position: absolute;
            white-space: nowrap;
            font-size: 10px;
            font-weight: 700;
            line-height: 1;
            z-index: 6;
            pointer-events: none;
            color: var(--text);
            opacity: 0.85;
            right: calc(100% + 3px);
            text-align: right;
            transform: translateY(-50%);
            letter-spacing: -0.3px;
        }

        .ptr-line {
            position: absolute;
            left: -18px;
            right: -18px;
            height: 4px;
            background: #fff;
            border: 2.3px solid var(--main);
            border-radius: 2px;
            z-index: 10;
            transition: top 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .report-box {
            background: var(--main);
            color: #fff;
            padding: 25px;
            border-radius: 25px;
            font-size: 14px;
            line-height: 1.6;
            margin-bottom: 25px;
        }
        .report-box h3 {
            margin-bottom: 12px;
            font-size: 18px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.3);
            padding-bottom: 5px;
        }
        .report-grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: 12px;
            margin-top: 15px;
        }
        .report-item {
            background: rgba(255, 255, 255, 0.15);
            padding: 12px;
            border-radius: 12px;
            font-size: 12.5px;
            border-left: 4px solid #fff;
        }
        .report-item b {
            display: block;
            font-size: 13px;
            text-transform: uppercase;
            margin-bottom: 3px;
            opacity: 0.9;
        }

        .details {
            padding: 35px;
            border-radius: 35px;
            background: var(--card);
            border: 1px solid var(--border);
            font-size: 15px;
            margin-bottom: 50px;
            line-height: 1.8;
        }
        .details h1 {
            font-size: 26px;
            margin-bottom: 25px;
            border-left: 8px solid var(--main);
            padding-left: 20px;
            color: var(--text);
        }
        .details h2 {
            font-size: 20px;
            margin: 35px 0 15px;
            color: var(--main);
            font-weight: 900;
        }
        .details h3 {
            font-size: 17px;
            margin-top: 25px;
            font-weight: 800;
        }
        .details p {
            margin-bottom: 18px;
            opacity: 0.9;
            text-align: justify;
        }
        .formula-box {
            background: rgba(128, 128, 128, 0.06);
            padding: 25px;
            border-radius: 18px;
            text-align: center;
            font-weight: 900;
            border: 2px dashed var(--main);
            font-size: 22px;
            margin: 30px 0;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            margin: 30px 0;
            font-size: 13px;
        }
        th {
            background: var(--main);
            color: #fff;
            padding: 15px;
            text-align: left;
        }
        td {
            padding: 12px 15px;
            border-bottom: 1px solid var(--border);
            background: rgba(128, 128, 128, 0.02);
        }

        .footer {
            text-align: center;
            padding: 50px;
            font-size: 12px;
            opacity: 0.5;
        }
    </style>
</head>
<body data-theme="white">

    <div class="nav">
        <div class="style-row">
            <span class="style-label" id="i18n-lang-label">Language:</span>
            <div class="btn-grp" id="l-grp">
                <button class="btn active" data-lang="en" onclick="setLang('en', this)">English</button>
                <button class="btn" data-lang="es" onclick="setLang('es', this)">Español</button>
                <button class="btn" data-lang="tc" onclick="setLang('tc', this)">繁體中文</button>
                <button class="btn" data-lang="jp" onclick="setLang('jp', this)">日本語</button>

        <div class="style-row">
            <span class="style-label" id="i18n-style-label">Theme:</span>

                        <rect id="v-al" fill="currentColor" x="28" y="45" width="8" height="55" rx="4" />
                        <rect id="v-ar" fill="currentColor" x="64" y="45" width="8" height="55" rx="4" />
                        <rect fill="currentColor" x="38" y="112" width="10" height="75" rx="5" />
                        <rect fill="currentColor" x="52" y="112" width="10" height="75" rx="5" />
                    </svg>
                </div>
                <div class="res-display">

                <div class="scale-area">
                    <div class="std-label L" id="std-l-label">WHO Global</div>

    <script>
        let curLang = 'en';

        const i18n = {
            en: {
                langLabel: "Language",
                styleLabel: "Display",
                h: "Height CM",
                w: "Weight KG",
                cats: ["Severely Thin", "Underweight", "Healthy", "Overweight", "Obese I", "Obese II", "Obese III"],
                reps: [
                    "<h3>Severely Thin (BMI < 16.0)</h3><div class='report-item'><b>Clinical Risk:</b> Extreme risk of organ failure, electrolyte imbalance, and severe malnutrition.</div><div class='report-item'><b>Advice:</b> Immediate medical evaluation and structured nutritional support required. Do not attempt self-treatment.</div>",
                    "<h3>Underweight (BMI 16.0–18.4)</h3><div class='report-item'><b>Risk:</b> Higher susceptibility to osteoporosis, anemia, and weakened immune response.</div><div class='report-item'><b>Advice:</b> Increase intake of nutrient-dense whole foods, combine with resistance training to build lean mass.</div>",
                    "<h3>Healthy Weight (BMI 18.5–24.9)</h3><div class='report-item'><b>Status:</b> Optimal range associated with lowest all-cause mortality and metabolic disease risk.</div><div class='report-item'><b>Maintain:</b> Continue balanced diet, regular physical activity (150+ min/week), and stress management.</div>",
                    "<h3>Overweight (BMI 25.0–29.9)</h3><div class='report-item'><b>Risk:</b> Moderately elevated risk of type 2 diabetes, hypertension, and cardiovascular disease.</div><div class='report-item'><b>Action:</b> Reduce refined carbohydrates, increase daily step count, and monitor waist circumference.</div>",
                    "<h3>Obese Class I (BMI 30.0–34.9)</h3><div class='report-item'><b>Alert:</b> High probability of fatty liver, sleep apnea, and joint stress.</div><div class='report-item'><b>Strategy:</b> Consult a registered dietitian for a personalized calorie‑controlled plan and begin structured exercise.</div>",
                    "<h3>Obese Class II (BMI 35.0–39.9)</h3><div class='report-item'><b>Warning:</b> Very high risk; mortality rates 1.5–2.7× higher than normal weight. Often accompanied by metabolic syndrome.</div><div class='report-item'><b>Intervention:</b> Multidisciplinary approach – medical supervision, pharmacotherapy, or bariatric surgery evaluation.</div>",
                    "<h3>Obese Class III (BMI ≥ 40.0)</h3><div class='report-item'><b>Critical:</b> Life-threatening condition; 2–3× increase in early death risk. Severe strain on cardiovascular system.</div><div class='report-item'><b>Urgent:</b> Immediate specialist referral. Comprehensive weight management program essential for survival.</div>"
                ],
                wiki: `<h1>Body Mass Index (BMI): International Overview & Global Standards</h1>
                <p><b>BMI (Quetelet Index)</b> is the primary international metric for classifying body weight relative to height, adopted by WHO, CDC, and global health authorities.</p>
                <h2>1. Definition & Calculation</h2>
                <div class="formula-box">BMI = weight (kg) / height (m)²</div>
                <p><b>Imperial:</b> BMI = [weight (lb) / height (in)²] × 703</p>
                <h2>2. WHO International Classification</h2>
                <table><tr><th>Category</th><th>BMI (kg/m²)</th><th>Health Risk</th></tr>
                <tr><td>Severely Underweight</td><td>&lt;16.0</td><td>Organ failure, osteoporosis</td></tr>
                <tr><td>Underweight</td><td>16.0–18.4</td><td>Nutritional deficiency, immune impairment</td></tr>
                <tr><td>Normal weight</td><td>18.5–24.9</td><td>Lowest mortality risk</td></tr>
                <tr><td>Overweight</td><td>25.0–29.9</td><td>Elevated diabetes, hypertension risk</td></tr>
                <tr><td>Obesity Class I</td><td>30.0–34.9</td><td>High CVD, sleep apnea risk</td></tr>
                <tr><td>Obesity Class II</td><td>35.0–39.9</td><td>Very high mortality (1.5–2.7×)</td></tr>
                <tr><td>Obesity Class III</td><td>≥40.0</td><td>Morbid obesity – life‑threatening</td></tr></table>
                <h2>3. Global Prevalence (WHO, 2025)</h2>
                <p>Over 1 billion adults overweight; 670 million obese. Obesity has tripled since 1975. 39 million children under 5 and 340 million aged 5–19 are overweight/obese.</p>
                <h2>4. Asian‑Specific Thresholds</h2>
                <p>Asian populations exhibit higher metabolic risk at lower BMI. Overweight ≥23.0, obesity ≥27.5 (WHO expert consultation). This tool uses <b>23.0</b> as alert line and <b>25.0</b> as obesity threshold.</p>
                <h2>5. Limitations</h2>
                <p>BMI does not differentiate muscle from fat; athletes may be misclassified. Waist circumference and body fat percentage provide better visceral‑fat risk assessment.</p>
                <p><b>Source:</b> WHO, CDC (2023–2025). All data for international reference only.</p>`
            },
            zh: {

                styleLabel: "显示风格",
                h: "身高 CM",
                w: "体重 KG",
                cats: ["严重消瘦", "体重偏低", "健康体重", "超重阶段", "肥胖 I 级", "肥胖 II 级", "肥胖 III 级"],
                reps: [
                    "<h3>严重消瘦 (BMI < 16.0)</h3><div class='report-item'><b>临床风险：</b> 器官衰竭、电解质紊乱、严重营养不良风险极高。</div><div class='report-item'><b>建议：</b> 立即寻求医疗评估与结构化营养支持，切勿自行处理。</div>",

                    "<h3>超重阶段 (BMI 25.0–29.9)</h3><div class='report-item'><b>警示：</b> 2型糖尿病、高血压、心血管疾病风险中度升高。</div><div class='report-item'><b>对策：</b> 减少精制碳水，增加每日步数，监测腰围。</div>",

                    "<h3>肥胖 II 级 (BMI 35.0–39.9)</h3><div class='report-item'><b>警告：</b> 死亡风险是正常体重者的1.5–2.7倍，常伴有代谢综合征。</div><div class='report-item'><b>干预：</b> 多学科管理——医疗监督、药物治疗或减重手术评估。</div>",

                wiki: `<h1>身体质量指数（BMI）：国际概况与全球标准</h1>
                <p><b>BMI（凯特勒指数）</b>是国际上衡量体重相对于身高分类的主要指标，被WHO、CDC及全球卫生机构广泛采用。</p>
                <h2>1. 定义与计算</h2>

                <h2>2. WHO 国际分类</h2>

                <tr><td>体重偏低</td><td>16.0–18.4</td><td>营养缺乏、免疫功能下降</td></tr>

                <tr><td>肥胖 III 级</td><td>≥40.0</td><td>病态肥胖——危及生命</td></tr></table>

        function renderScale() {
            const bar = document.getElementById('bar');
            bar.querySelectorAll('.tick-text, .tick-line, .tick-num').forEach(e => e.remove());
            const MIN = 15, MAX = 45;
            const getTop = (v) => 100 - ((v - MIN) / (MAX - MIN) * 100);
            const cats = i18n[curLang].cats;

            const tickValues = [15, 18.5, 23, 25, 30, 35, 40, 45];
            tickValues.forEach(v => {
                const line = document.createElement('div');
                line.className = 'tick-line';
                if (v === 23 || v === 25) {
                    line.style.height = '2px';
                    line.style.background = 'rgba(255,255,255,0.9)';
                    line.style.zIndex = '6';
                }
                if (v === 15 || v === 45) {
                    line.style.background = 'rgba(255,255,255,0.35)';
                    line.style.height = '1px';
                }
                line.style.top = getTop(v) + '%';
                bar.appendChild(line);

                const numLabel = document.createElement('div');
                numLabel.className = 'tick-num';
                numLabel.style.top = getTop(v) + '%';
                numLabel.textContent = v === 18.5 ? '18.5' : String(v);
                bar.appendChild(numLabel);
            });

            const whoLevels = [
                { s: 15, e: 18.5, t: cats[1] },
                { s: 18.5, e: 25.0, t: cats[2] },
                { s: 25.0, e: 30.0, t: cats[3] },
                { s: 30.0, e: 45.0, t: cats[4] }
            ];
            whoLevels.forEach(lv => {
                const txt = document.createElement('div');
                txt.className = 'tick-text L';
                const mid = (getTop(lv.s) + getTop(lv.e)) / 2;
                txt.style.top = `calc(${mid}% - 6px)`;
                txt.innerHTML = `${lv.t}<br><span>${lv.s}-${lv.e}</span>`;
                bar.appendChild(txt);
            });

            const asiaLevels = [
                { s: 15, e: 18.5, t: cats[1] },
                { s: 18.5, e: 23.0, t: cats[2] },
                { s: 23.0, e: 25.0, t: cats[3] },
                { s: 25.0, e: 30.0, t: cats[4] },
                { s: 30.0, e: 45.0, t: cats[5] }
            ];
            asiaLevels.forEach(lv => {
                const txt = document.createElement('div');
                txt.className = 'tick-text R';
                const mid = (getTop(lv.s) + getTop(lv.e)) / 2;
                txt.style.top = `calc(${mid}% - 6px)`;
                txt.innerHTML = `${lv.t}<br><span>${lv.s}-${lv.e}</span>`;
                bar.appendChild(txt);
            });
        }

        function calc() {
            const h = document.getElementById('h').value / 100;
            const w = document.getElementById('w').value;
            if (!h || h <= 0) return;
            const bmi = (w / (h * h)).toFixed(1);
            document.getElementById('rv').innerText = bmi;
            const MIN = 15, MAX = 45;
            const pos = 100 - ((bmi - MIN) / (MAX - MIN) * 100);
            document.getElementById('ptr').style.top = Math.max(0, Math.min(100, pos)) + '%';

            let idx;
            if (bmi < 16) idx = 0;
            else if (bmi < 18.5) idx = 1;
            else if (bmi < 25) idx = 2;
            else if (bmi < 30) idx = 3;
            else if (bmi < 35) idx = 4;
            else if (bmi < 40) idx = 5;
            else idx = 6;

            document.getElementById('rl').innerText = i18n[curLang].cats[idx];
            const repArr = i18n[curLang].reps;
            document.getElementById('rep').innerHTML = repArr[idx] || repArr[2];

            const f = (bmi - 22) * 2.2;
            document.getElementById('v-body').setAttribute('d',
                `M${38-f/4},42 Q50,40 ${62+f/4},42 L${65+f/2},110 Q50,115 ${35-f/2},110 Z`);

            const theme = document.body.getAttribute('data-theme');
            const svg = document.querySelector('.body-svg');
            if (theme === 'white' || theme === 'dark') {
                svg.style.color = bmi < 18.5 ? '#3498db' : bmi < 25 ? '#2ecc71' : bmi < 30 ? '#f1c40f' : '#e74c3c';
            } else {
                svg.style.color = 'currentColor';
            }
        }

        updateUI();
    </script>
</body>
</html>
