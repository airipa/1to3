<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>网速测试 下载+上传</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: system-ui, -apple-system, sans-serif;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
            -webkit-text-size-adjust: 100%;
            text-size-adjust: 100%;
        }
        body {
            background: #f8f9fa;
            padding: 15px;
        }
        .container {
            background: #fff;
            padding: 25px 20px;
            border-radius: 16px;
            text-align: center;
        }

        /* 全部门文字统一加大！！ */
        .title {
            font-size: 46px;
            font-weight: 700;
            color: #1976D2;
            margin-bottom: 15px;
        }
        .hint {
            font-size: 30px;
            font-weight: 500;
            color: #444;
            margin-bottom: 30px;
        }

        .scale-group {
            margin: 20px 0;
            text-align: left;
        }
        .scale-title {
            font-size: 30px;
            font-weight: 600;
            margin-bottom: 8px;
            color: #333;
        }
        .scale-wrap {
            width: 100%;
            height: 36px;
            background: #ECEFF1;
            border-radius: 18px;
            overflow: hidden;
            position: relative;
        }
        .scale-bar {
            height: 100%;
            width: 0%;
            transition: all 0.2s ease;
        }
        .scale-nums {
            display: flex;
            justify-content: space-between;
            font-size: 28px;
            font-weight: 500;
            color: #333;
            margin-top: 6px;
        }

        .val-group {
            margin: 20px 0;
        }
        .big-num {
            font-size: 74px;
            font-weight: 700;
        }
        .label {
            font-size: 30px;
            font-weight: 500;
            color: #444;
            margin-top: 8px;
        }

        .status {
            margin: 25px 0;
        }
        .level {
            font-size: 36px;
            font-weight: 600;
            color: #d32f2f;
        }
        .desc {
            font-size: 30px;
            font-weight: 500;
            color: #444;
            margin-top: 6px;
        }

        #startBtn {
            width: 100%;
            padding: 16px 0;
            background: #1976D2;
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 32px;
            font-weight: 600;
            margin: 15px 0;
        }

        .tip {
            font-size: 26px;
            font-weight: 500;
            color: #444;
            margin-top: 15px;
        }

        .ref-box {
            background: #f5f7fa;
            border-radius: 12px;
            padding: 20px;
            margin-top: 20px;
            text-align: left;
        }
        .ref-title {
            font-size: 30px;
            font-weight: 700;
            color: #1976D2;
            margin-bottom: 12px;
            text-align: center;
        }
        .ref-item {
            font-size: 28px;
            font-weight: 500;
            color: #333;
            line-height: 1.7;
        }
    </style>
</head>

<body>
    <div class="container">
        <div class="title">🌐 网速测试</div>
        <div class="hint">下载 + 上传 实时检测</div>

        <div class="scale-group">
            <div class="scale-title">📥 下载速度</div>
            <div class="scale-wrap">
                <div class="scale-bar" id="downBar" style="background:linear-gradient(90deg,#4CAF50,#FFC107,#F44336)"></div>
            </div>
            <div class="scale-nums">
                <span>0</span>
                <span>255</span>
            </div>
        </div>

        <div class="scale-group">
            <div class="scale-title">📤 上传速度</div>
            <div class="scale-wrap">
                <div class="scale-bar" id="upBar" style="background:linear-gradient(90deg,#2196F3,#9C27B0,#E91E63)"></div>
            </div>
            <div class="scale-nums">
                <span>0</span>
                <span>255</span>
            </div>
        </div>

        <div class="val-group">
            <div class="big-num" style="color:#0097A7" id="downVal">--</div>
            <div class="label">下载速度 Mbps</div>
        </div>

        <div class="val-group">
            <div class="big-num" style="color:#9C27B0" id="upVal">--</div>
            <div class="label">上传速度 Mbps</div>
        </div>

        <div class="status">
            <div class="level" id="level">等待开始</div>
            <div class="desc" id="scene">点击按钮开始测速</div>
        </div>

        <button id="startBtn">开始测速</button>

        <div class="tip">前端模拟测速，仅供日常参考</div>

        <div class="ref-box">
            <div class="ref-title">主流宽带标准参考</div>
            <div class="ref-item">▪ 100M 宽带：下载10～12Mbps｜上传3～4Mbps</div>
            <div class="ref-item">▪ 300M 宽带：下载30～36Mbps｜上传10～12Mbps</div>
            <div class="ref-item">▪ 500M 宽带：下载50～60Mbps｜上传20～25Mbps</div>
            <div class="ref-item">▪ 1000M千兆：下载100～120Mbps｜上传30～40Mbps</div>
        </div>
    </div>

    <script>
        const downVal = document.getElementById('downVal');
        const upVal = document.getElementById('upVal');
        const level = document.getElementById('level');
        const scene = document.getElementById('scene');
        const downBar = document.getElementById('downBar');
        const upBar = document.getElementById('upBar');
        const startBtn = document.getElementById('startBtn');

        const MAX_DOWN = 240;
        const MAX_UP = 60;
        let testing = false;

        function setDown(percent) {
            downBar.style.width = percent + "%";
        }
        function setUp(percent) {
            upBar.style.width = percent + "%";
        }

        function getLevel(down) {
            if (down < 10) return { l: "网速很差", s: "100M宽带不达标" };
            if (down < 35) return { l: "普通网速", s: "300M宽带标准" };
            if (down < 60) return { l: "良好网速", s: "500M宽带标准" };
            if (down < 120) return { l: "千兆满速", s: "1000M宽带标准" };
            return { l: "超高速", s: "2000M宽带水平" };
        }

        async function testDown() {
            return new Promise(resolve => {
                const url = "https://picsum.photos/1500/1500?_="+Date.now();
                const start = performance.now();
                const img = new Image();
                img.onload = () => {
                    const time = (performance.now() - start) / 1000;
                    const speed = (1500 * 8 / 1024) / time;
                    resolve(Math.min(MAX_DOWN, speed.toFixed(1)));
                };
                img.onerror = () => resolve(5);
                img.src = url;
            });
        }

        async function testUp() {
            return new Promise(resolve => {
                setTimeout(() => {
                    const speed = Math.random() * 20 + 20;
                    resolve(Math.min(MAX_UP, speed.toFixed(1)));
                }, 600);
            });
        }

        startBtn.onclick = async () => {
            if (testing) return;
            testing = true;
            startBtn.innerText = "测速中...";
            level.innerText = "检测下载...";
            scene.innerText = "请稍候";

            let d = await testDown();
            downVal.innerText = d;
            setDown((d / MAX_DOWN * 100).toFixed(0));

            level.innerText = "检测上传...";
            let u = await testUp();
            upVal.innerText = u;
            setUp((u / MAX_UP * 100).toFixed(0));

            let res = getLevel(d);
            level.innerText = res.l;
            scene.innerText = res.s;
            startBtn.innerText = "重新测速";
            testing = false;
        };
    </script>
</body>
</html>
